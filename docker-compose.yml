version: "3.8"

services:
  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: myworkspace-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-myworkspace}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-myworkspace123}
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: myworkspace-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: myworkspace-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-myworkspace}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-myworkspace123}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: myworkspace-backend
    environment:
      NODE_ENV: production
      PORT: 4000
      MONGODB_URI: mongodb://${MONGO_USER:-myworkspace}:${MONGO_PASS:-myworkspace123}@mongodb:27017/myworkspace?authSource=admin
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-myworkspace}:${RABBITMQ_PASS:-myworkspace123}@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-myworkspace}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      APP_URL: ${APP_URL:-http://localhost:3000}

      # AI Provider - Routing
      AI_PROVIDER: ${AI_PROVIDER:-openrouter}
      AI_MODEL: ${AI_MODEL:-qwen/qwen3-coder:free}
      AI_ROUTING_STRATEGY: ${AI_ROUTING_STRATEGY:-auto}
      AI_FALLBACK_ENABLED: ${AI_FALLBACK_ENABLED:-true}
      AI_ENABLE_ORCHESTRATOR: ${AI_ENABLE_ORCHESTRATOR:-true}
      AI_ENABLE_ENHANCED_MEMORY: ${AI_ENABLE_ENHANCED_MEMORY:-true}
      AI_ENABLE_RAG: ${AI_ENABLE_RAG:-true}
      AI_ENABLE_PROMPT_GUARD: ${AI_ENABLE_PROMPT_GUARD:-true}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS:-8192}
      AI_TEMPERATURE: ${AI_TEMPERATURE:-0.7}

      # AI Provider - OpenRouter
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_API_BASE: ${OPENROUTER_API_BASE:-https://openrouter.ai/api/v1}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-qwen/qwen3-coder:free}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-}
      OPENROUTER_SITE_NAME: ${OPENROUTER_SITE_NAME:-MyWorkspace}

      # AI Provider - OpenAI
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}

      # AI Provider - Anthropic
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_API_BASE: ${ANTHROPIC_API_BASE:-https://api.anthropic.com/v1}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}

      # AI Provider - Google Gemini
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_API_BASE: ${GEMINI_API_BASE:-https://generativelanguage.googleapis.com/v1beta}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}

      # AI Provider - Groq
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_API_BASE: ${GROQ_API_BASE:-https://api.groq.com/openai/v1}
      GROQ_MODEL: ${GROQ_MODEL:-llama-4-scout-17b-16e-instruct}

      # AI Provider - DeepSeek
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_API_BASE: ${DEEPSEEK_API_BASE:-https://api.deepseek.com/v1}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}

      # AI Provider - Mistral
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      MISTRAL_API_BASE: ${MISTRAL_API_BASE:-https://api.mistral.ai/v1}
      MISTRAL_MODEL: ${MISTRAL_MODEL:-mistral-large-latest}

      # AI Provider - Perplexity
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}
      PERPLEXITY_API_BASE: ${PERPLEXITY_API_BASE:-https://api.perplexity.ai}
      PERPLEXITY_MODEL: ${PERPLEXITY_MODEL:-sonar-pro}

      # AI Provider - Ollama (local)
      OLLAMA_API_BASE: ${OLLAMA_API_BASE:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1}

      # Vector Store
      VECTOR_STORE_TYPE: ${VECTOR_STORE_TYPE:-memory}
      CHROMA_URL: ${CHROMA_URL:-http://chromadb:8000}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}

      # Embedding
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      OPENAI_EMBEDDING_API_KEY: ${OPENAI_EMBEDDING_API_KEY:-}
      GOOGLE_EMBEDDING_API_KEY: ${GOOGLE_EMBEDDING_API_KEY:-}
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  rabbitmq_data:
  redis_data:
  mongodb_data:
