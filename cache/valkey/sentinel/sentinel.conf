# Valkey Sentinel Configuration - MyWorkSpace HA Monitoring
# Provides automatic failover for standalone Valkey instances

port 26379
daemonize no
sentinel monitor mymaster valkey-0 6379 2
sentinel down-after-milliseconds mymaster 5000
sentinel failover-timeout mymaster 60000
sentinel parallel-syncs mymaster 1
sentinel auth-pass mymaster ${VALKEY_PASSWORD}
sentinel resolve-hostnames yes
sentinel announce-hostnames yes

# Security
protected-mode no
bind 0.0.0.0

# Logging
logfile ""
loglevel notice
