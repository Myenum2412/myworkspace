# Valkey Standalone Configuration - MyWorkSpace In-Memory Cache
# Optimized for application caching, sessions, auth tokens, permissions

port 6379
bind 0.0.0.0
protected-mode yes
requirepass ${VALKEY_PASSWORD}
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command CONFIG ""

# Memory management
maxmemory 4gb
maxmemory-policy allkeys-lru
maxmemory-samples 10

# Persistence (AOF + RDB for production)
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Performance tuning
timeout 300
tcp-keepalive 300
tcp-backlog 511
hz 10
dynamic-hz yes
activedefrag yes

# Key tracking for cache invalidation
tracking-table-max-keys 1000000

# Logging
loglevel notice
logfile ""

# Security (users.acl disabled for dev - use requirepass instead)
# aclfile /etc/valkey/users.acl

# TLS (production - enabled when certs are mounted)
# tls-port 0
# tls-cert-file /etc/valkey/tls/valkey.crt
# tls-key-file /etc/valkey/tls/valkey.key
# tls-ca-cert-file /etc/valkey/tls/ca.crt

# Networking
replica-serve-stale-data yes
replica-read-only yes
repl-diskless-sync yes
repl-diskless-sync-delay 5

# Notifications for keyspace events (cache invalidation)
notify-keyspace-events KEA

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128
