user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# CPU affinity for performance
worker_cpu_affinity auto;

events {
  worker_connections 16384;
  use epoll;
  multi_accept on;
  accept_mutex off;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Logging format with cache status
  log_format json_combined escape=json '{
    "time": "$time_iso8601",
    "remote_addr": "$remote_addr",
    "request": "$request",
    "status": $status,
    "body_bytes_sent": $body_bytes_sent,
    "request_time": $request_time,
    "upstream_addr": "$upstream_addr",
    "upstream_status": "$upstream_status",
    "upstream_response_time": "$upstream_response_time",
    "cache_status": "$upstream_cache_status",
    "http_referrer": "$http_referer",
    "http_user_agent": "$http_user_agent",
    "http_x_forwarded_for": "$http_x_forwarded_for"
  }';

  access_log /var/log/nginx/access.log json_combined buffer=32k flush=5s;
  error_log /var/log/nginx/error.log warn;

  # Performance tuning
  sendfile on;
  sendfile_max_chunk 512k;
  tcp_nopush on;
  tcp_nodelay on;
  server_tokens off;
  server_names_hash_bucket_size 128;
  types_hash_max_size 2048;
  client_max_body_size 100m;
  client_body_buffer_size 128k;
  client_header_buffer_size 8k;
  large_client_header_buffers 8 8k;
  keepalive_timeout 65;
  keepalive_requests 1000;
  reset_timedout_connection on;
  lingering_close off;
  connection_pool_size 4096;
  request_pool_size 32k;

  # Compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1000;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml
    application/xml+rss
    application/x-javascript
    application/x-httpd-php
    image/svg+xml
    image/x-icon
    font/ttf
    font/otf
    font/woff
    font/woff2;

  # Brotli compression (requires nginx-plus or module; disabled in base image)
  # brotli on;
  # brotli_comp_level 6;
  # brotli_min_length 1000;
  # brotli_types
  #   text/plain
  #   text/css
  #   text/xml
  #   text/javascript
  #   application/json
  #   application/javascript
  #   application/xml
  #   application/xml+rss
  #   image/svg+xml
  #   font/ttf
  #   font/otf
  #   font/woff
  #   font/woff2;

  # Cache zones
  proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:500m
    max_size=10g inactive=60m use_temp_path=off;
  proxy_cache_path /var/cache/nginx/static levels=1:2 keys_zone=static_cache:500m
    max_size=50g inactive=7d use_temp_path=off;
  proxy_cache_path /var/cache/nginx/tus levels=1:2 keys_zone=tus_cache:100m
    max_size=5g inactive=24h use_temp_path=off;

  # CDN cache zone (used by cdn.conf)
  proxy_cache_path /var/cache/nginx/cdn levels=1:2 keys_zone=cdn_cache:500m
    max_size=100g inactive=30d use_temp_path=off;

  # Resolver for Docker DNS
  resolver 127.0.0.11 valid=30s ipv6=off;

  # Upstreams
  upstream backend_servers {
    zone backend 256k;
    least_conn;
    server backend:4000 max_fails=3 fail_timeout=30s weight=10 resolve;
    keepalive 256;
    keepalive_requests 1000;
    keepalive_timeout 60s;
  }

  upstream varnish_servers {
    zone varnish 256k;
    ip_hash;
    server varnish:80 max_fails=3 fail_timeout=30s resolve;
    keepalive 128;
  }

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=20r/m;
  limit_req_zone $binary_remote_addr zone=api_limit:100m rate=600r/m;
  limit_req_zone $binary_remote_addr zone=upload_limit:50m rate=50r/m;
  limit_req_zone $binary_remote_addr zone=search_limit:50m rate=100r/m;
  limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

  # Include site configurations
  include /etc/nginx/conf.d/*.conf;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # Default server
  server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
  }
}
