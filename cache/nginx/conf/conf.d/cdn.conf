# CDN Cache Configuration
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name cdn.myworkspace.myenum.in;

  ssl_certificate /etc/nginx/ssl/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/privkey.pem;
  ssl_session_cache shared:CDN_SSL:10m;
  ssl_session_timeout 1d;
  ssl_protocols TLSv1.2 TLSv1.3;

  # HTTP/3
  listen 443 quic reuseport;
  add_header Alt-Svc 'h3=":443"; ma=86400';

  # Security headers
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Cache-Control "public, max-age=31536000, immutable";

  # Root
  root /var/www/public;

  # Aggressive caching for static assets
  location ~* \.(js|css|svg|png|jpg|jpeg|gif|ico|webp|avif|woff2?|ttf|eot|otf|pdf)$ {
    expires 365d;
    add_header Cache-Control "public, immutable, max-age=31536000";
    access_log off;
    add_header X-Cache-Status "CDN-HIT";
    try_files $uri @origin;
  }

  # Next.js static build output
  location /_next/static/ {
    expires 365d;
    add_header Cache-Control "public, immutable, max-age=31536000";
    access_log off;
    add_header X-Cache-Status "CDN-HIT";
    try_files $uri @origin;
  }

  # Uploads - shorter TTL but still cached
  location /uploads/ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400";
    add_header X-Cache-Status "CDN-HIT";
    try_files $uri @origin;
  }

  # Banners
  location /banners/ {
    expires 1d;
    add_header Cache-Control "public, max-age=86400";
    add_header X-Cache-Status "CDN-HIT";
    try_files $uri @origin;
  }

  # Origin pass-through
  location @origin {
    internal;
    proxy_pass http://varnish_servers;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_cache cdn_cache;
    proxy_cache_key "$scheme$host$request_uri";
    proxy_cache_valid 200 30d;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_lock on;
    proxy_cache_lock_timeout 5s;
    add_header X-Cache-Status $upstream_cache_status;
  }

  location /nginx-health {
    access_log off;
    return 200 "healthy\n";
    add_header Content-Type text/plain;
  }
}