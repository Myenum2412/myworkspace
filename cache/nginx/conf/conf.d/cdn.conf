# MyWorkSpace CDN Configuration
# Serves static assets from edge cache with origin fallback

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name cdn.myworkspace.myenum.in;

  ssl_certificate /etc/nginx/ssl/cdn.fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/cdn.privkey.pem;
  ssl_session_cache shared:CDN_SSL:10m;
  ssl_protocols TLSv1.2 TLSv1.3;

  # Cache zone for CDN (defined in main nginx.conf)

  root /var/www/cdn;
  open_file_cache max=10000 inactive=30d;
  open_file_cache_valid 60s;
  open_file_cache_min_uses 2;
  open_file_cache_errors on;

  # Image optimization and caching
  location ~* \.(jpg|jpeg|png|gif|webp|avif|svg)$ {
    expires 365d;
    add_header Cache-Control "public, immutable, max-age=31536000";
    add_header X-Cache-Status $upstream_cache_status;
    access_log off;
    try_files $uri @cdn_origin;
  }

  # Font caching
  location ~* \.(woff2?|ttf|eot|otf)$ {
    expires 365d;
    add_header Cache-Control "public, immutable, max-age=31536000";
    add_header Access-Control-Allow-Origin "*";
    access_log off;
    try_files $uri @cdn_origin;
  }

  # Video caching (large files)
  location ~* \.(mp4|webm|avi|mov|mkv)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    proxy_cache cdn_cache;
    proxy_cache_key "$uri";
    proxy_cache_valid 200 30d;
    proxy_cache_use_stale error timeout updating;
    proxy_cache_lock on;
    proxy_max_temp_file_size 2048m;
    add_header X-Cache-Status $upstream_cache_status;
    try_files $uri @cdn_origin;
  }

  # Fallback to origin
  location @cdn_origin {
    proxy_pass http://backend_servers;
    proxy_cache cdn_cache;
    proxy_cache_key "$uri";
    proxy_cache_valid 200 365d;
    proxy_cache_valid 404 1m;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_lock on;
    proxy_cache_lock_timeout 10s;
    add_header X-Cache-Status $upstream_cache_status;
  }

  # Health check
  location /cdn-health {
    access_log off;
    return 200 "healthy\n";
  }
}
