# MyWorkSpace - Main Site Configuration
# Optimized for performance, caching, and security

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name myworkspace.myenum.in;

  # SSL
  ssl_certificate /etc/nginx/ssl/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/privkey.pem;
  ssl_session_cache shared:SSL:50m;
  ssl_session_timeout 1d;
  ssl_session_tickets off;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers off;
  ssl_stapling on;
  ssl_stapling_verify on;
  resolver 8.8.8.8 8.8.4.4 valid=300s;
  resolver_timeout 5s;

  # HTTP/3 (QUIC)
  listen 443 quic reuseport;
  add_header Alt-Svc 'h3=":443"; ma=86400';

  # Security headers
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;

  # Root for static files
  root /var/www/public;
  index index.html;

  # Static assets - cached aggressively
  location ~* \.(js|css|svg|png|jpg|jpeg|gif|ico|webp|woff2?|ttf|eot|pdf)$ {
    expires 365d;
    add_header Cache-Control "public, immutable, max-age=31536000";
    access_log off;
    add_header X-Cache-Status "STATIC";
    try_files $uri @varnish;
  }

  # Next.js static build output
  location /_next/static/ {
    expires 365d;
    add_header Cache-Control "public, immutable, max-age=31536000";
    access_log off;
    proxy_pass http://varnish_servers;
  }

  # API routes
  location /api/ {
    limit_req zone=api_limit burst=100 nodelay;
    limit_conn conn_limit 50;

    # Don't cache non-GET
    if ($request_method !~ ^(GET|HEAD)$) {
      set $no_cache 1;
    }

    # Auth endpoints - never cache
    location /api/auth/ {
      limit_req zone=auth_limit burst=5 nodelay;
      proxy_no_cache 1;
      proxy_cache_bypass 1;
      proxy_pass http://backend_servers;
    }

    # Search endpoint - rate limited
    location /api/search {
      limit_req zone=search_limit burst=20 nodelay;
      proxy_cache api_cache;
      proxy_cache_key "$scheme$request_method$host$request_uri";
      proxy_cache_valid 200 60s;
      proxy_cache_valid 404 5s;
      proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
      proxy_cache_lock on;
      proxy_cache_lock_timeout 5s;
      proxy_pass http://backend_servers;
    }

    # Dashboard endpoint
    location /api/dashboard {
      proxy_cache api_cache;
      proxy_cache_key "$scheme$request_method$host$request_uri";
      proxy_cache_valid 200 120s;
      proxy_cache_use_stale error timeout updating;
      proxy_cache_lock on;
      add_header X-Cache-Status $upstream_cache_status;
      proxy_pass http://backend_servers;
    }

    # File upload - don't cache, rate limited
    location /api/files/upload {
      limit_req zone=upload_limit burst=10 nodelay;
      client_max_body_size 500m;
      client_body_buffer_size 1m;
      proxy_request_buffering on;
      proxy_pass http://backend_servers;
    }

    # TUS upload endpoint
    location /api/files-tus {
      client_max_body_size 10g;
      client_body_buffer_size 2m;
      proxy_request_buffering off;
      proxy_pass http://backend_servers;
    }

    # Default API proxy
    proxy_cache api_cache;
    proxy_cache_key "$scheme$request_method$host$request_uri";
    proxy_cache_valid 200 30s;
    proxy_cache_valid 404 5s;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_lock on;
    proxy_cache_lock_timeout 5s;
    add_header X-Cache-Status $upstream_cache_status;
    proxy_pass http://backend_servers;
  }

  # Varnish proxy for HTML/cached content
  location @varnish {
    proxy_pass http://varnish_servers;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering on;
    proxy_buffer_size 8k;
    proxy_buffers 256 8k;
    proxy_busy_buffers_size 64k;
    proxy_max_temp_file_size 0;
  }

  # Default: proxy to Varnish
  location / {
    proxy_pass http://varnish_servers;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering on;
    proxy_buffer_size 8k;
    proxy_buffers 256 8k;
    proxy_busy_buffers_size 64k;
    proxy_max_temp_file_size 0;
  }

  # Health check endpoint
  location /nginx-health {
    access_log off;
    return 200 "healthy\n";
    add_header Content-Type text/plain;
  }
}
