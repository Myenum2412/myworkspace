route:
  group_by: ["alertname", "cluster"]
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 4h
  receiver: "default"
  routes:
    - match:
        severity: critical
      receiver: "critical"
      repeat_interval: 5m
      routes:
        - match:
            alertname: ValkeyDown
          receiver: "critical"
          repeat_interval: 1m
        - match:
            alertname: ValkeyClusterNodeDown
          receiver: "critical"
          repeat_interval: 1m
        - match:
            alertname: ValkeyFailoverEvent
          receiver: "critical"
          repeat_interval: 1m
        - match:
            alertname: CacheLayerDown
          receiver: "critical"
          repeat_interval: 1m
    - match:
        severity: warning
      receiver: "warning"
      repeat_interval: 30m
      routes:
        - match:
            alertname: HighMemoryUsage
          receiver: "warning"
        - match:
            alertname: LowHitRate
          receiver: "warning"
        - match:
            alertname: HighLatency
          receiver: "warning"
        - match:
            alertname: HighEvictionRate
          receiver: "warning"
        - match:
            alertname: ClusterSlotMigration
          receiver: "warning"

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["cluster", "instance"]
  - source_match:
      alertname: ValkeyDown
    target_match:
      alertname:
        - HighMemoryUsage
        - LowHitRate
        - HighLatency
    equal: ["cluster", "instance"]
  - source_match:
      alertname: ValkeyClusterNodeDown
    target_match:
      alertname:
        - HighMemoryUsage
        - ClusterSlotMigration
    equal: ["cluster"]

receivers:
  - name: "default"
    email_configs:
      - to: "cache-team@example.com"
        from: "alertmanager@example.com"
        smarthost: "smtp.example.com:587"
        auth_username: "alertmanager@example.com"
        auth_password: "${SMTP_PASSWORD}"
        headers:
          subject: '{{ template "email.default.subject" . }}'
        html: '{{ template "email.default.html" . }}'
    webhook_configs:
      - url: "http://webhook-bridge:8080/alert"
        send_resolved: true
        http_config:
          basic_auth:
            username: "${WEBHOOK_USER}"
            password: "${WEBHOOK_PASSWORD}"

  - name: "critical"
    email_configs:
      - to: "cache-team@example.com"
        from: "alertmanager@example.com"
        smarthost: "smtp.example.com:587"
        auth_username: "alertmanager@example.com"
        auth_password: "${SMTP_PASSWORD}"
        headers:
          subject: '[CRITICAL] {{ .GroupLabels.alertname }} - {{ .GroupLabels.cluster }}'
        html: '{{ template "email.default.html" . }}'
        send_resolved: true
    webhook_configs:
      - url: "http://webhook-bridge:8080/alert/critical"
        send_resolved: true
        http_config:
          basic_auth:
            username: "${WEBHOOK_USER}"
            password: "${WEBHOOK_PASSWORD}"
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#cache-alerts"
        title: '[CRITICAL] {{ .GroupLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
            *Alert:* {{ .Labels.alertname }}
            *Cluster:* {{ .Labels.cluster }}
            *Instance:* {{ .Labels.instance }}
            *Description:* {{ .Annotations.description }}
            *Severity:* {{ .Labels.severity }}
          {{ end }}
        send_resolved: true
    pagerduty_configs:
      - routing_key: "${PAGERDUTY_ROUTING_KEY}"
        severity: critical
        description: '{{ .GroupLabels.alertname }} - {{ .GroupLabels.cluster }}'
        details:
          firing: '{{ .Alerts.Firing | len }}'
          resolved: '{{ .Alerts.Resolved | len }}'
        send_resolved: true

  - name: "warning"
    email_configs:
      - to: "cache-team@example.com"
        from: "alertmanager@example.com"
        smarthost: "smtp.example.com:587"
        auth_username: "alertmanager@example.com"
        auth_password: "${SMTP_PASSWORD}"
        headers:
          subject: '[WARNING] {{ .GroupLabels.alertname }} - {{ .GroupLabels.cluster }}'
        html: '{{ template "email.default.html" . }}'
        send_resolved: true
    webhook_configs:
      - url: "http://webhook-bridge:8080/alert/warning"
        send_resolved: true
        http_config:
          basic_auth:
            username: "${WEBHOOK_USER}"
            password: "${WEBHOOK_PASSWORD}"
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#cache-warnings"
        title: '[WARNING] {{ .GroupLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
            *Alert:* {{ .Labels.alertname }}
            *Cluster:* {{ .Labels.cluster }}
            *Instance:* {{ .Labels.instance }}
            *Description:* {{ .Annotations.description }}
          {{ end }}
        send_resolved: true

templates:
  - "/etc/alertmanager/templates/*.tmpl"
