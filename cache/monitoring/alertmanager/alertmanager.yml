route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      repeat_interval: 10m
    - match:
        severity: warning
      receiver: 'warning'
      repeat_interval: 1h

receivers:
  - name: 'default'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/${SLACK_WEBHOOK_URL}'
        channel: '#alerts'
        send_resolved: true
        title: '{{ .GroupLabels.alertname }}'
        text: '{{ .CommonAnnotations.description }}'
    webhook_configs:
      - url: 'http://backend:4000/api/webhooks/alertmanager'

  - name: 'critical'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/${SLACK_WEBHOOK_URL}'
        channel: '#critical'
        send_resolved: true
        title: '[CRITICAL] {{ .GroupLabels.alertname }}'
        text: '{{ .CommonAnnotations.description }}'
        actions:
          - type: button
            text: 'View in Grafana'
            url: 'https://grafana.myworkspace.myenum.in'
    pagerduty_configs:
      - routing_key: '${PAGERDUTY_ROUTING_KEY}'
        severity: critical

  - name: 'warning'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/${SLACK_WEBHOOK_URL}'
        channel: '#alerts'
        send_resolved: true
        title: '[WARNING] {{ .GroupLabels.alertname }}'
        text: '{{ .CommonAnnotations.description }}'