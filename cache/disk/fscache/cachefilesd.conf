# CacheFiles daemon configuration for FS-Cache
# Used to cache NFS, AFS, and other network filesystems on local disk

dir /var/cache/fscache
tag default
# Maximum cache size in bytes (100 GiB)
brun 0%
bcull 5%
bstop 10%
frun 10%
fcull 5%
fstop 0%
# Block size in bytes (256)
bsize 256
# Number of threads for cache processing
nothreads 4
# Use dedicated block device (optional)
# device /dev/sdb1
