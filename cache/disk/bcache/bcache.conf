# bcache sysctl tuning parameters
# These control how bcache handles I/O patterns and writeback behavior

# Congested read threshold (microseconds)
# If the SSD cache device takes longer than this to complete a read,
# bcache considers the device congested and skips caching
# Default: 2000
devices/bcache/*/congested_read_threshold_us = 2000

# Congested write threshold (microseconds)
# If the SSD cache device takes longer than this to complete a write,
# bcache considers the device congested and writes directly to backing
# Default: 20000
devices/bcache/*/congested_write_threshold_us = 20000

# Sequential cutoff (sectors)
# I/O requests larger than this are considered sequential and bypass the cache
# Set to 0 to cache all requests regardless of sequentiality
# Default: 0 (cache all)
devices/bcache/*/sequential_cutoff = 0

# Writeback rate (bytes/second)
# Controls how aggressively dirty data is written back from cache to backing device
# Higher values = faster writeback, more consistent backing device load
# Default: 1024 * 1024 (1 MiB/s)
devices/bcache/*/writeback_rate = 1048576

# Writeback rate update interval (seconds)
# How often bcache recalculates the writeback rate
# Default: 60
devices/bcache/*/writeback_rate_update_seconds = 60

# Writeback rate minimum (bytes/second)
# Minimum writeback rate even under light load
# Default: 8
devices/bcache/*/writeback_rate_minimum = 8

# Writeback rate proportional term
# Controls how aggressively bcache increases writeback rate when dirty data grows
# Default: 0.0 (disabled)
devices/bcache/*/writeback_rate_p_term_inverse = 10000

# Writeback rate change step (bytes/second)
# Maximum change per update interval
# Default: 1024
devices/bcache/*/writeback_rate_d_term = 30

# Cached IO error limit
# Number of errors before bcache detaches the cache device
# Default: 0 (unlimited)
devices/bcache/*/io_error_limit = 0

# GC period (seconds)
# How often bcache runs garbage collection on the cache device
# Default: 300
devices/bcache/*/gc_period = 300
