apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: cache-system
  labels:
    app.kubernetes.io/name: nginx
    app.kubernetes.io/part-of: myworkspace
    app.kubernetes.io/component: cache
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
        app.kubernetes.io/name: nginx
        app.kubernetes.io/part-of: myworkspace
        app.kubernetes.io/component: cache
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
              name: http
            - containerPort: 443
              name: https
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: nginx-ssl
              mountPath: /etc/nginx/ssl
              readOnly: true
          resources:
            limits:
              memory: 1Gi
              cpu: "1"
            requests:
              memory: 256Mi
              cpu: 100m
          readinessProbe:
            exec:
              command:
                - wget
                - -q
                - -O
                - /dev/null
                - http://localhost/nginx-health
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - wget
                - -q
                - -O
                - /dev/null
                - http://localhost/nginx-health
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
        - name: nginx-ssl
          secret:
            secretName: nginx-ssl
