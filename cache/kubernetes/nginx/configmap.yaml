apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: cache-system
  labels:
    app.kubernetes.io/name: nginx
    app.kubernetes.io/part-of: myworkspace
    app.kubernetes.io/component: cache
data:
  nginx.conf: |
    user nginx;
    worker_processes auto;
    worker_rlimit_nofile 65535;
    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;
    worker_cpu_affinity auto;

    events {
      worker_connections 16384;
      use epoll;
      multi_accept on;
      accept_mutex off;
    }

    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;

      log_format json_combined escape=json '{
        "time": "$time_iso8601",
        "remote_addr": "$remote_addr",
        "request": "$request",
        "status": $status,
        "body_bytes_sent": $body_bytes_sent,
        "request_time": $request_time,
        "upstream_addr": "$upstream_addr",
        "upstream_status": "$upstream_status",
        "upstream_response_time": "$upstream_response_time",
        "cache_status": "$upstream_cache_status",
        "http_referrer": "$http_referer",
        "http_user_agent": "$http_user_agent",
        "http_x_forwarded_for": "$http_x_forwarded_for"
      }';

      access_log /var/log/nginx/access.log json_combined buffer=32k flush=5s;
      error_log /var/log/nginx/error.log warn;

      sendfile on;
      sendfile_max_chunk 512k;
      tcp_nopush on;
      tcp_nodelay on;
      server_tokens off;
      server_names_hash_bucket_size 128;
      types_hash_max_size 2048;
      client_max_body_size 100m;
      client_body_buffer_size 128k;
      client_header_buffer_size 8k;
      large_client_header_buffers 8 8k;
      keepalive_timeout 65;
      keepalive_requests 1000;
      reset_timedout_connection on;
      lingering_close off;
      connection_pool_size 4096;
      request_pool_size 32k;

      gzip on;
      gzip_vary on;
      gzip_proxied any;
      gzip_comp_level 6;
      gzip_min_length 1000;
      gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/x-javascript
        image/svg+xml
        image/x-icon
        font/ttf
        font/otf
        font/woff
        font/woff2;

      proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:500m
        max_size=10g inactive=60m use_temp_path=off;
      proxy_cache_path /var/cache/nginx/static levels=1:2 keys_zone=static_cache:500m
        max_size=50g inactive=7d use_temp_path=off;
      proxy_cache_path /var/cache/nginx/cdn levels=1:2 keys_zone=cdn_cache:500m
        max_size=100g inactive=30d use_temp_path=off;

      resolver 127.0.0.11 valid=30s ipv6=off;

      upstream backend_servers {
        zone backend 256k;
        least_conn;
        server backend:4000 max_fails=3 fail_timeout=30s weight=10 resolve;
        keepalive 256;
        keepalive_requests 1000;
        keepalive_timeout 60s;
      }

      upstream varnish_servers {
        zone varnish 256k;
        ip_hash;
        server varnish:80 max_fails=3 fail_timeout=30s resolve;
        keepalive 128;
      }

      limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=20r/m;
      limit_req_zone $binary_remote_addr zone=api_limit:100m rate=600r/m;
      limit_req_zone $binary_remote_addr zone=upload_limit:50m rate=50r/m;
      limit_req_zone $binary_remote_addr zone=search_limit:50m rate=100r/m;
      limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

      server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
      }

      server {
        listen 80;
        listen [::]:80;
        server_name myworkspace.myenum.in;
        return 301 https://$server_name$request_uri;
      }

      server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name myworkspace.myenum.in;

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        location /nginx-health {
          access_log off;
          return 200 "healthy\n";
          add_header Content-Type text/plain;
        }

        location /api/ {
          proxy_pass http://backend_servers;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header Connection "";

          proxy_cache api_cache;
          proxy_cache_key "$scheme$request_method$host$request_uri";
          proxy_cache_valid 200 2m;
          proxy_cache_valid 404 1m;
          proxy_cache_valid 500 502 503 504 0s;
          proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
          proxy_cache_background_update on;
          proxy_cache_lock on;
          proxy_cache_lock_timeout 5s;
          proxy_ignore_headers Set-Cookie;
          proxy_hide_header Set-Cookie;
          add_header X-Cache-Status $upstream_cache_status;

          limit_req zone=api_limit burst=200 nodelay;
          limit_conn conn_limit 50;
        }

        location ~* \.(css|js|svg|png|jpg|jpeg|gif|ico|webp|avif|woff2?|ttf|eot|otf|pdf)$ {
          proxy_pass http://backend_servers;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header Connection "";

          proxy_cache static_cache;
          proxy_cache_key "$scheme$host$request_uri";
          proxy_cache_valid 200 7d;
          proxy_cache_valid 404 1h;
          proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
          proxy_cache_background_update on;
          proxy_cache_lock on;
          proxy_cache_lock_timeout 5s;
          proxy_ignore_headers Set-Cookie;
          proxy_hide_header Set-Cookie;
          add_header X-Cache-Status $upstream_cache_status;

          expires 30d;
          add_header Cache-Control "public, immutable";
          access_log off;
        }

        location /_next/static/ {
          proxy_pass http://backend_servers;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

          proxy_cache static_cache;
          proxy_cache_key "$scheme$host$request_uri";
          proxy_cache_valid 200 365d;
          proxy_cache_use_stale error timeout updating;
          proxy_cache_background_update on;
          proxy_cache_lock on;
          add_header X-Cache-Status $upstream_cache_status;

          expires 365d;
          add_header Cache-Control "public, immutable";
          access_log off;
        }

        location / {
          proxy_pass http://backend_servers;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";

          proxy_cache api_cache;
          proxy_cache_key "$scheme$request_method$host$request_uri";
          proxy_cache_valid 200 5m;
          proxy_cache_valid 404 1m;
          proxy_cache_use_stale error timeout updating;
          proxy_cache_background_update on;
          proxy_cache_lock on;
          add_header X-Cache-Status $upstream_cache_status;

          proxy_set_header X-Original-URI $request_uri;
        }
      }
    }
