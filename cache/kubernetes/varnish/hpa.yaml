apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: varnish
  namespace: cache-system
  labels:
    app.kubernetes.io/name: varnish
    app.kubernetes.io/part-of: myworkspace
    app.kubernetes.io/component: cache
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: varnish
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
