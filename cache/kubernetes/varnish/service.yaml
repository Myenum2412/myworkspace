apiVersion: v1
kind: Service
metadata:
  name: varnish
  namespace: cache-system
  labels:
    app.kubernetes.io/name: varnish
    app.kubernetes.io/part-of: myworkspace
    app.kubernetes.io/component: cache
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
    - name: admin
      port: 6082
      targetPort: 6082
      protocol: TCP
  selector:
    app: varnish
