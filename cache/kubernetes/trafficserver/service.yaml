apiVersion: v1
kind: Service
metadata:
  name: trafficserver
  namespace: cache-system
  labels:
    app.kubernetes.io/name: trafficserver
    app.kubernetes.io/part-of: myworkspace
    app.kubernetes.io/component: cache
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app: trafficserver
