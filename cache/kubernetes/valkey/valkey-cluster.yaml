apiVersion: v1
kind: Service
metadata:
  name: valkey-cluster
  labels:
    app: valkey-cluster
    cache-layer: distributed
spec:
  ports:
    - name: valkey
      port: 6379
      targetPort: 6379
    - name: cluster-bus
      port: 16379
      targetPort: 16379
  clusterIP: None
  selector:
    app: valkey-cluster
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: valkey-cluster
spec:
  serviceName: valkey-cluster
  replicas: 6
  selector:
    matchLabels:
      app: valkey-cluster
  template:
    metadata:
      labels:
        app: valkey-cluster
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - valkey-cluster
                topologyKey: kubernetes.io/hostname
      containers:
        - name: valkey
          image: valkey/valkey:8-alpine
          command:
            - valkey-server
            - /etc/valkey/valkey.conf
          ports:
            - containerPort: 6379
              name: valkey
            - containerPort: 16379
              name: cluster-bus
          volumeMounts:
            - name: config
              mountPath: /etc/valkey
            - name: data
              mountPath: /data
          resources:
            limits:
              memory: 2Gi
              cpu: "1"
            requests:
              memory: 1Gi
              cpu: "0.5"
          readinessProbe:
            exec:
              command:
                - valkey-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - valkey-cli
                - ping
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: valkey-cluster-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
        storageClassName: ssd
---
apiVersion: batch/v1
kind: Job
metadata:
  name: valkey-cluster-init
spec:
  template:
    spec:
      containers:
        - name: init
          image: valkey/valkey:8-alpine
          command: ["/bin/sh", "/scripts/init-cluster.sh"]
          volumeMounts:
            - name: scripts
              mountPath: /scripts
          env:
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: valkey-secret
                  key: password
      volumes:
        - name: scripts
          configMap:
            name: valkey-cluster-init-script
      restartPolicy: Never
