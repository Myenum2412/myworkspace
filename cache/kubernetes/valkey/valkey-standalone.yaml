apiVersion: v1
kind: Service
metadata:
  name: valkey
  labels:
    app: valkey
    cache-layer: memory
spec:
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: valkey
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey
spec:
  replicas: 1
  selector:
    matchLabels:
      app: valkey
  template:
    metadata:
      labels:
        app: valkey
    spec:
      containers:
        - name: valkey
          image: valkey/valkey:8-alpine
          command: ["valkey-server", "/etc/valkey/valkey.conf"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: config
              mountPath: /etc/valkey
            - name: data
              mountPath: /data
          resources:
            limits:
              memory: 4Gi
              cpu: "2"
            requests:
              memory: 2Gi
              cpu: "1"
          env:
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: valkey-secret
                  key: password
      volumes:
        - name: config
          configMap:
            name: valkey-config
        - name: data
          persistentVolumeClaim:
            claimName: valkey-data
