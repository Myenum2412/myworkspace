name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag to deploy"
        required: false
        type: string
      skip_verify:
        description: "Skip post-deployment verification"
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  validate:
    name: Pre-deployment Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: TypeScript Check (Backend)
        working-directory: backend
        run: |
          npm ci
          npx tsc --noEmit

      - name: TypeScript Check (Frontend)
        working-directory: frontend
        run: |
          npm ci
          npx tsc --noEmit

      - name: Unit & Integration Tests
        working-directory: backend
        run: npm run test:integration
        env:
          MONGODB_URI: mongodb://localhost:27017/myworkspace_test
          JWT_SECRET: test-secret-do-not-use-in-production
          NODE_ENV: test
        services:
          mongodb:
            image: mongo:7
            ports:
              - 27017:27017

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

  build-and-push:
    name: Build & Push Docker Images
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      backend_tag: ${{ steps.meta.outputs.tags }}
      frontend_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/myworkspace-backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/myworkspace-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/myworkspace-frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/myworkspace-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/myworkspace
            git pull

            # Update image tags for rolling deploy
            export IMAGE_TAG=${{ github.sha }}

            # Zero-downtime deploy
            bash scripts/zero-downtime-deploy.sh $IMAGE_TAG

  verify:
    name: Post-deployment Verification
    needs: deploy
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_verify }}
    steps:
      - name: Wait for rollout
        run: sleep 15

      - name: Verify Health
        run: |
          curl -sf --retry 10 --retry-delay 5 \
            https://${{ secrets.DOMAIN }}/api/health || exit 1

      - name: Verify Auth
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST -H "Content-Type: application/json" \
            -d '{"email":"verify@test.com","password":"wrong"}' \
            https://${{ secrets.DOMAIN }}/api/auth/login)
          [ "$STATUS" = "401" ] || exit 1

      - name: Verify Security Headers
        run: |
          HEADERS=$(curl -sI https://${{ secrets.DOMAIN }}/api/health)
          echo "$HEADERS" | grep -q "strict-transport-security" || exit 1
          echo "$HEADERS" | grep -q "content-security-policy" || exit 1

      - name: Notify Slack on Success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ MyWorkSpace deployment successful\nCommit: ${{ github.sha }}\nEnvironment: Production\nBy: ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
