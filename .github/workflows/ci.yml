name: CI/CD

on:
  push:
    branches: [main, Najas-Dev]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm run build
        env:
          AUTH_URL: ${{ vars.AUTH_URL || 'http://localhost:3000' }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'ci-build-secret' }}
          AUTH_LINKEDIN_ID: ${{ vars.AUTH_LINKEDIN_ID || 'ci-dummy-id' }}
          AUTH_LINKEDIN_SECRET: ${{ secrets.AUTH_LINKEDIN_SECRET || 'ci-dummy-secret' }}
          AUTH_GOOGLE_ID: ${{ vars.AUTH_GOOGLE_ID || 'ci-dummy-id' }}
          AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET || 'ci-dummy-secret' }}
          MONGODB_URI: ${{ secrets.MONGODB_URI || '' }}
          NEXT_PUBLIC_WS_URL: ${{ vars.NEXT_PUBLIC_WS_URL || 'ws://localhost:4000' }}

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - run: npm run build

      - name: Cache MongoDB binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-binaries-${{ runner.os }}

      - run: npm test

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            cd /root/myworkspace
            git pull origin main

            # Frontend
            cd frontend
            npm ci --include=dev
            npm run build
            cd ..

            # Backend
            cd backend
            npm ci --include=dev
            npm run build
            cd ..

            # Restart
            pm2 restart workspace-api 2>/dev/null || pm2 start "npm" --name workspace-api -- run start
            pm2 restart workspace-frontend 2>/dev/null || pm2 start "npm" --name workspace-frontend -- run start
