name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend lint & build
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run build
        env:
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-build-secret' }}
          MONGODB_URI: ${{ secrets.MONGODB_URI || 'mongodb://localhost:27017/test' }}

      - name: Backend build
        working-directory: backend
        run: |
          npm ci
          npm run build

  deploy:
    name: Deploy to DigitalOcean
    runs-on: self-hosted
    needs: [lint-and-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          path: myworkspace

      - name: Deploy
        working-directory: myworkspace
        run: |
          cd frontend
          npm ci --include=dev
          npm run build
          cd ..

          cd backend
          npm ci --include=dev
          npm run build
          cd ..

          pm2 restart workspace-api 2>/dev/null || pm2 start backend/dist/index.js --name workspace-api
          pm2 restart workspace-frontend 2>/dev/null || pm2 start npm --name workspace-frontend -- run start
