name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npx tsc --noEmit

      - run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - run: npx tsc --noEmit

      - run: npm run build

  deploy:
    name: Deploy to Digital Ocean
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            cd /root/myworkspace
            git pull origin main

            # Install frontend deps & build
            cd frontend
            npm ci --include=dev
            npm run build
            cp -r .next ../.next 2>/dev/null; true
            cp -r public ../public 2>/dev/null; true
            cd ..

            # Install backend deps & build
            cd backend
            npm ci
            npx tsc
            cd ..

            # Restart PM2 processes
            pm2 restart workspace-api 2>/dev/null || pm2 start backend/dist/index.js --name workspace-api
            pm2 restart workspace-frontend 2>/dev/null || pm2 start frontend/node_modules/.bin/next --name workspace-frontend --start -p 3000
