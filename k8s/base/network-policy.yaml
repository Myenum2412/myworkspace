apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: myworkspace-network-policy
  namespace: myworkspace
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
        - protocol: TCP
          port: 4000
    # Allow traffic between frontend and backend
    - from:
        - podSelector:
            matchLabels:
              app: myworkspace-frontend
      to:
        - podSelector:
            matchLabels:
              app: myworkspace-backend
      ports:
        - protocol: TCP
          port: 4000
    # Allow Prometheus scraping
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 4000
        - protocol: TCP
          port: 3000
  egress:
    # Allow DNS
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow MongoDB Atlas
    - to: []
      ports:
        - protocol: TCP
          port: 27017
    # Allow Redis
    - to:
        - podSelector:
            matchLabels:
              app: myworkspace-redis
      ports:
        - protocol: TCP
          port: 6379
    # Allow external HTTPS (Stripe, Resend, S3, etc.)
    - to: []
      ports:
        - protocol: TCP
          port: 443
    # Allow internal communication
    - to:
        - podSelector:
            matchLabels:
              app: myworkspace-backend
    - to:
        - podSelector:
            matchLabels:
              app: myworkspace-frontend
