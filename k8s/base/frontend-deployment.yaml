apiVersion: apps/v1
kind: Deployment
metadata:
  name: myworkspace-frontend
  namespace: myworkspace
  labels:
    app: myworkspace-frontend
    tier: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: myworkspace-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: myworkspace-frontend
        tier: frontend
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: frontend
          image: myworkspace/frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: API_URL
              value: "http://myworkspace-backend:4000"
            - name: NEXTAUTH_URL
              valueFrom:
                configMapKeyRef:
                  name: myworkspace-config
                  key: NEXTAUTH_URL
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: myworkspace-secrets
                  key: NEXTAUTH_SECRET
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          startupProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: myworkspace-frontend
