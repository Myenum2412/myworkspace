apiVersion: v1
kind: ConfigMap
metadata:
  name: myworkspace-config
  namespace: myworkspace
data:
  NODE_ENV: "production"
  PORT: "4000"
  MONGODB_DB: "myworkspace"
  CORS_ORIGIN: "https://myworkspace.myenum.in"
  NEXTAUTH_URL: "https://myworkspace.myenum.in"
  TRIAL_DAYS: "15"
  LOG_LEVEL: "info"

  # AI Provider Configuration
  AI_PROVIDER: "openrouter"
  AI_MODEL: "qwen/qwen3-coder:free"
  AI_ROUTING_STRATEGY: "auto"
  AI_FALLBACK_ENABLED: "true"
  AI_ENABLE_ORCHESTRATOR: "true"
  AI_ENABLE_ENHANCED_MEMORY: "true"
  AI_ENABLE_RAG: "true"
  AI_ENABLE_PROMPT_GUARD: "true"
  AI_MAX_TOKENS: "8192"
  AI_TEMPERATURE: "0.7"

  OPENROUTER_API_BASE: "https://openrouter.ai/api/v1"
  OPENROUTER_MODEL: "qwen/qwen3-coder:free"
  OPENAI_API_BASE: "https://api.openai.com/v1"
  OPENAI_MODEL: "gpt-4o"
  ANTHROPIC_API_BASE: "https://api.anthropic.com/v1"
  ANTHROPIC_MODEL: "claude-sonnet-4-20250514"
  GEMINI_API_BASE: "https://generativelanguage.googleapis.com/v1beta"
  GEMINI_MODEL: "gemini-2.5-flash"
  GROQ_API_BASE: "https://api.groq.com/openai/v1"
  GROQ_MODEL: "llama-4-scout-17b-16e-instruct"
  DEEPSEEK_API_BASE: "https://api.deepseek.com/v1"
  DEEPSEEK_MODEL: "deepseek-chat"
  MISTRAL_API_BASE: "https://api.mistral.ai/v1"
  MISTRAL_MODEL: "mistral-large-latest"
  PERPLEXITY_API_BASE: "https://api.perplexity.ai"
  PERPLEXITY_MODEL: "sonar-pro"
  OLLAMA_API_BASE: "http://ollama:11434"
  OLLAMA_MODEL: "llama3.1"

  # Vector Store
  VECTOR_STORE_TYPE: "memory"
  EMBEDDING_PROVIDER: "openai"
---
apiVersion: v1
kind: Secret
metadata:
  name: myworkspace-secrets
  namespace: myworkspace
type: Opaque
stringData:
  MONGODB_URI: "mongodb+srv://user:pass@cluster.mongodb.net/myworkspace"
  JWT_SECRET: "CHANGE_ME_TO_A_STRONG_SECRET"
  NEXTAUTH_SECRET: "CHANGE_ME_TO_A_STRONG_SECRET"
  ADMIN_EMAIL: "admin@myworkspace.com"
  ADMIN_PASSWORD: "CHANGE_ME"
  RESEND_API_KEY: "re_CHANGE_ME"
  STRIPE_SECRET_KEY: "sk_live_CHANGE_ME"
  STRIPE_WEBHOOK_SECRET: "whsec_CHANGE_ME"
  S3_ACCESS_KEY_ID: "CHANGE_ME"
  S3_SECRET_ACCESS_KEY: "CHANGE_ME"
  S3_BUCKET_NAME: "myworkspace"
  S3_ENDPOINT: "https://CHANGE_ME.r2.cloudflarestorage.com"
  REDIS_URL: "redis://myworkspace-redis:6379"
  VAPID_PUBLIC_KEY: "CHANGE_ME"
  VAPID_PRIVATE_KEY: "CHANGE_ME"

  # AI Provider API Keys
  OPENROUTER_API_KEY: "CHANGE_ME"
  OPENAI_API_KEY: "CHANGE_ME"
  ANTHROPIC_API_KEY: "CHANGE_ME"
  GEMINI_API_KEY: "CHANGE_ME"
  GROQ_API_KEY: "CHANGE_ME"
  DEEPSEEK_API_KEY: "CHANGE_ME"
  MISTRAL_API_KEY: "CHANGE_ME"
  PERPLEXITY_API_KEY: "CHANGE_ME"

  # Vector Store Credentials
  CHROMA_URL: "http://chromadb:8000"
  QDRANT_URL: "http://qdrant:6333"
  PINECONE_API_KEY: "CHANGE_ME"
  PINECONE_ENVIRONMENT: "us-east-1"

  # Embedding Keys
  OPENAI_EMBEDDING_API_KEY: "CHANGE_ME"
  GOOGLE_EMBEDDING_API_KEY: "CHANGE_ME"
