apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myworkspace-ingress
  namespace: myworkspace
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - myworkspace.myenum.in
        - api.myworkspace.myenum.in
      secretName: myworkspace-tls
  rules:
    - host: myworkspace.myenum.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: myworkspace-frontend
                port:
                  number: 3000
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: myworkspace-backend
                port:
                  number: 4000
          - path: /uploads
            pathType: Prefix
            backend:
              service:
                name: myworkspace-backend
                port:
                  number: 4000
          - path: /banners
            pathType: Prefix
            backend:
              service:
                name: myworkspace-backend
                port:
                  number: 4000
    - host: api.myworkspace.myenum.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: myworkspace-backend
                port:
                  number: 4000
