apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/rules/*.yml

    scrape_configs:
      - job_name: 'myworkspace-backend'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - myworkspace
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2

      - job_name: 'myworkspace-frontend'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - myworkspace
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: myworkspace-frontend

      - job_name: 'redis'
        static_configs:
          - targets: ['myworkspace-redis:6379']

      - job_name: 'mongodb'
        static_configs:
          - targets: ['myworkspace-mongodb:27017']
