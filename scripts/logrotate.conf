# MyWorkSpace Application Log Rotation
# Place in /etc/logrotate.d/myworkspace

/var/log/myworkspace/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    dateext
    dateformat -%Y%m%d
    create 0640 root root
    postrotate
        # Reload Caddy to reopen logs
        docker compose -f /opt/myworkspace/docker-compose.yml -f /opt/myworkspace/docker-compose.prod.yml exec -T caddy caddy reload --config /etc/caddy/Caddyfile 2>/dev/null || true
    endscript
}

/var/log/caddy/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    dateext
    dateformat -%Y%m%d
    create 0640 caddy caddy
    postrotate
        docker compose -f /opt/myworkspace/docker-compose.yml -f /opt/myworkspace/docker-compose.prod.yml kill -s USR1 caddy 2>/dev/null || true
    endscript
}

/var/log/nginx/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    dateext
    dateformat -%Y%m%d
    create 0640 www-data adm
    sharedscripts
    postrotate
        [ -f /var/run/nginx.pid ] && kill -USR1 $(cat /var/run/nginx.pid) 2>/dev/null || true
    endscript
}
